{% load static %}
<!doctype html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<style>
body{
  font-family:Arial;
  background:#eef4ff;
  margin:0;
}

/* КНОПКА */
.ai-float{
  position:fixed;
  right:25px;
  bottom:25px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:linear-gradient(135deg,#5d97ff,#4a86f7);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

/* POPUP */
.ai-popup{
  position:fixed;
  right:25px;
  bottom:120px;
  width:320px;
  height:420px;
  background:white;
  border-radius:20px;
  display:none;
  flex-direction:column;
  box-shadow:0 20px 50px rgba(0,0,0,.2);
}

/* HEADER */
.ai-header{
  padding:12px;
  background:#4a86f7;
  color:white;
  font-weight:700;
  border-radius:20px 20px 0 0;
  display:flex;
  justify-content:space-between;
}

/* CHAT */
.ai-messages{
  flex:1;
  padding:10px;
  overflow:auto;
  font-size:14px;
}

/* INPUT */
.ai-input{
  display:flex;
  border-top:1px solid #eee;
}

.ai-input input{
  flex:1;
  border:none;
  padding:10px;
}

.ai-input button{
  background:#4a86f7;
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
}

/* MESSAGE */
.msg-user{
  text-align:right;
  margin:5px;
}

.msg-bot{
  text-align:left;
  margin:5px;
}
</style>
</head>

<body>

<h2 style="padding:20px;">Профиль беті</h2>

<!-- КНОПКА -->
<div class="ai-float" onclick="toggleChat()">
  AI
</div>

<!-- POPUP -->
<div class="ai-popup" id="chatPopup">

  <div class="ai-header">
    AI Chat
    <span style="cursor:pointer" onclick="toggleChat()">✕</span>
  </div>

  <div class="ai-messages" id="chatBox">
    <div class="msg-bot">Сәлем 👋</div>
  </div>

  <div class="ai-input">
    <input type="text" id="chatInput" placeholder="Сұрақ жаз...">
    <button onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
let opened=false;

function toggleChat(){
  const popup=document.getElementById("chatPopup");
  opened=!opened;
  popup.style.display=opened?"flex":"none";
}

function addMessage(text,type){
  const box=document.getElementById("chatBox");
  const div=document.createElement("div");
  div.className= type==="user"?"msg-user":"msg-bot";
  div.innerText=text;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

async function sendMessage(){
  const input=document.getElementById("chatInput");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  addMessage("Жүктелуде...","bot");

  try{
    const res=await fetch("{% url 'ai_web_chat_api' %}",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "X-CSRFToken":getCookie("csrftoken")
      },
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    document.querySelector("#chatBox .msg-bot:last-child").remove();

    addMessage(data.answer,"bot");

  }catch{
    addMessage("Қате шықты","bot");
  }
}

function getCookie(name){
  let v=document.cookie.split("; ").find(row=>row.startsWith(name+"="));
  return v?v.split("=")[1]:"";
}
</script>

</body>
</html>
